template_name: heliogrid_pulse_square_launch
priority_notes:
  - platform_specs.txt overrides this file for canvas size, safe margins, CTA placement, and minimum type sizes.
  - deprecated_assets.json overrides this file and asset_manifest.json for any forbidden or retired asset.
canvas:
  aspect_ratio: "1:1"
  intended_size: "1080x1080 px"
zones:
  top_title_zone:
    position: "top 25% of canvas"
    required_content:
      - "product name as primary headline"
      - "launch message as core subtitle"
  upper_right_logo_zone:
    position: "upper-right inside safe margin"
    required_content:
      - "current HelioGrid logo or clearly current HelioGrid wordmark treatment"
  middle_hero_visual_zone:
    position: "central 45% of canvas"
    required_content:
      - "home energy storage product or battery system"
      - "solar or modern residential energy context"
  bottom_cta_zone:
    position: "bottom 25% of canvas, inside platform safe margin"
    required_content:
      - "required supporting line"
      - "required call to action"
layout_intent: "clean technical product launch, with clear hierarchy and spacious margins"
