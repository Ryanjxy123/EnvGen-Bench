template_name: cedar_loop_square_launch_v2
canvas:
  preferred_width_px: 1080
  preferred_height_px: 1080
zones:
  - id: brand_message_zone
    role: brand name and launch message
    placement: top third
    hierarchy: "brand name first, launch message second"
  - id: hero_zone
    role: neighborhood market-stall or makers visual
    placement: middle
    notes: "Use fresh stalls, local makers, produce, flowers, bread, ceramics, or a short walking path cue."
  - id: logo_zone
    role: current loop-leaf logo or friendly wordmark
    placement: lower-left
    notes: "Keep inside safe margin. Do not use the old black crest."
  - id: detail_zone
    role: date line and CTA
    placement: bottom area
prohibited_layout_basis:
  - city skyline hero
  - luxury fashion editorial layout
  - neon night-market poster
