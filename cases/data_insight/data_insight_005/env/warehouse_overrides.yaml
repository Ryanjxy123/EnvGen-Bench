included_warehouses:
  - W1
  - W2
exclude_record_types:
  - forecast
  - subtotal
  - test
exclude_statuses:
  - planned
exclude_movement_types:
  - transfer
period:
  start: 2026-09-01
  end: 2026-09-30
notes:
  - Inactive SKUs stay out even if actual posted rows exist.
  - Transfer rows move stock between warehouses and should not be counted as demand.
  - Forecast rows are planning demand, not observed sales.
